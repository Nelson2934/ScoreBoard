<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GXO Darts Scoreboard</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
  --gxo-orange: #FF3A00;
  --gxo-orange-glow: rgba(255, 58, 0, 0.35);
  --gxo-dark: #0A0A0A;
  --gxo-text: #F0F0F0;
  --gxo-muted: #666;
  --gxo-gold: #FFD700;
  --gxo-silver: #C0C0C0;
  --gxo-bronze: #CD7F32;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#000;
  color:var(--gxo-text);
  font-family:'Space Mono', monospace;
  overflow:hidden;
}

.app {
  height:100vh;
  display:flex;
  flex-direction:column;
  padding:20px;
}

/* HEADER */
header {
  text-align:center;
}

.gxo-logo {
  font-family:'Bebas Neue';
  font-size:48px;
  letter-spacing:10px;
  color:var(--gxo-orange);
}

/* BOARD */
.board {
  flex:1;
  overflow:hidden;
  margin-top:10px;
}

.score-row {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 20px;
  border-bottom:1px solid rgba(255,255,255,0.05);

  transition: transform 0.35s cubic-bezier(0.22,1,0.36,1),
              background 0.3s ease;
}

.top-1 {
  background: rgba(255,58,0,0.15);
  animation: leaderPulse 2.5s infinite;
}

.player-name {
  font-weight:bold;
}

.player-score {
  font-family:'Bebas Neue';
  font-size:32px;
}

/* ANIMATIONS */
@keyframes popIn {
  0% { transform:scale(0.9); opacity:0; }
  60% { transform:scale(1.05); opacity:1; }
  100% { transform:scale(1); }
}

.new-entry {
  animation: popIn 0.4s ease;
}

@keyframes leaderPulse {
  0% { box-shadow:0 0 0 rgba(255,58,0,0); }
  50% { box-shadow:0 0 25px rgba(255,58,0,0.5); }
  100% { box-shadow:0 0 0 rgba(255,58,0,0); }
}

</style>
</head>

<body>

<div class="app">
  <header>
    <div class="gxo-logo">GXO DARTS</div>
  </header>

  <div class="board" id="board"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyBAtoiBIjO9YOSpq01NE4PIXfKojIHhoNo",
  authDomain: "gxodarts.firebaseapp.com",
  databaseURL: "https://gxodarts-default-rtdb.firebaseio.com",
});

const db = firebase.database();
const scoresRef = db.ref('darts_scores');

let entries = [];
let previousPositions = {};

// LOAD DATA
scoresRef.on('value', snap => {
  entries = [];
  const data = snap.val();
  if (data) {
    Object.keys(data).forEach(k => {
      entries.push({ key:k, ...data[k] });
    });
  }
  render();
});

// RENDER
function render() {
  const board = document.getElementById('board');
  const sorted = [...entries].sort((a,b)=>b.score-a.score);

  // STORE OLD POSITIONS
  const oldPositions = {};
  document.querySelectorAll('.score-row').forEach(row => {
    oldPositions[row.dataset.key] = row.getBoundingClientRect();
  });

  board.innerHTML = sorted.map((e,i)=>{
    const isNew = !previousPositions[e.key];
    return `
      <div class="score-row ${i===0?'top-1':''} ${isNew?'new-entry':''}" data-key="${e.key}">
        <div>${i+1}. ${e.name}</div>
        <div class="player-score">${e.score}</div>
      </div>
    `;
  }).join('');

  // ANIMATE MOVEMENT
  requestAnimationFrame(()=>{
    document.querySelectorAll('.score-row').forEach(row=>{
      const key = row.dataset.key;
      const newPos = row.getBoundingClientRect();
      const oldPos = oldPositions[key];

      if(oldPos){
        const dx = oldPos.left - newPos.left;
        const dy = oldPos.top - newPos.top;

        if(dx || dy){
          row.style.transform = `translate(${dx}px, ${dy}px)`;
          row.offsetHeight;
          row.style.transform = '';
        }
      }
    });
  });

  // SAVE STATE
  previousPositions = {};
  document.querySelectorAll('.score-row').forEach(r=>{
    previousPositions[r.dataset.key] = true;
  });
}

// RESIZE OPTIMISATION
let resizeTimer;
window.addEventListener('resize', ()=>{
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(render,100);
});
</script>

</body>
</html>
